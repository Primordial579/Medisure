spring.application.name=auth-service
server.port=${AUTH_PORT:9090}

# MySQL
spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root@39}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT
jwt.secret=${JWT_SECRET:MediSureSuperSecretKeyForJWTTokenGeneration2026!@#$%^&*()}
jwt.expiration-ms=${JWT_EXPIRATION:3600000}
