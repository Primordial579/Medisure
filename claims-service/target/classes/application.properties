spring.application.name=claims-service
server.port=${CLAIMS_PORT:9093}

# MySQL
spring.datasource.url=${CLAIMS_DB_URL:jdbc:mysql://localhost:3306/claims_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root@39}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Inter-service URLs
hospital.service.base-url=${HOSPITAL_URL:http://localhost:9091}
insurance.service.base-url=${INSURANCE_URL:http://localhost:9092}

# JWT
jwt.secret=${JWT_SECRET:MediSureSuperSecretKeyForJWTTokenGeneration2026!@#$%^&*()}
