<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSure - Register Hospital User</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="register-wrapper hospital-bg">
    <div>
        <a href="login.html" class="back-link">&#8592; Back to Login</a>
        <div class="register-card">
            <div class="logo">
                <h1>&#x1F3E5; Hospital User Registration</h1>
                <p>Create a new hospital staff account</p>
            </div>

            <div id="registerAlert" style="display:none; padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px;"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="e.g. dr.priya" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Dr. Priya Sharma" required>
                    </div>
                    <div class="form-group">
                        <label>Hospital Name</label>
                        <input type="text" id="hospitalName" placeholder="City General Hospital" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="priya@hospital.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNo" placeholder="9876543210" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select id="role" required>
                        <option value="">Select a role</option>
                        <option value="DOCTOR">Doctor</option>
                        <option value="STAFF">Hospital Staff</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-hospital" id="registerBtn" style="margin-top:8px;">
                    Create Account
                </button>
            </form>

            <div class="login-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    const AUTH_URL = 'http://localhost:9090';
    const HOSPITAL_URL = 'http://localhost:9091';

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Creating...';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const name = document.getElementById('name').value.trim();
        const hospitalName = document.getElementById('hospitalName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phoneNo = document.getElementById('phoneNo').value.trim();
        const role = document.getElementById('role').value;

        try {
            // Step 1: Create hospital user profile (no password - auth service handles credentials)
            const hospitalRes = await fetch(`${HOSPITAL_URL}/api/hospital/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, name, hospitalName, email, phoneNo, role })
            });

            const hospitalData = await hospitalRes.json();
            if (!hospitalRes.ok) {
                throw new Error(hospitalData.message || 'Failed to create hospital user');
            }

            const hospitalUserId = hospitalData.userId;

            // Step 2: Register credentials in auth service
            const authRes = await fetch(`${AUTH_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username,
                    password,
                    email,
                    phoneNo,
                    userType: 'HOSPITAL_USER',
                    hospitalUserId
                })
            });

            const authData = await authRes.json();
            if (!authRes.ok) {
                throw new Error(authData.message || 'Failed to register auth user');
            }

            showAlert('Account created successfully! Redirecting to login...', 'success');
            setTimeout(() => window.location.href = 'login.html', 2000);

        } catch (err) {
            showAlert(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Create Account';
        }
    }

    function showAlert(message, type) {
        const alert = document.getElementById('registerAlert');
        alert.style.display = 'block';
        alert.textContent = message;
        if (type === 'error') {
            alert.style.background = '#fee2e2';
            alert.style.color = '#991b1b';
        } else {
            alert.style.background = '#dcfce7';
            alert.style.color = '#166534';
        }
    }
</script>

</body>
</html>
