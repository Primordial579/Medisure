spring.application.name=insurance-service-test

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:insurance_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never

# JWT
jwt.secret=MediSureSuperSecretKeyForJWTTokenGeneration2026TestOnly
